</h4>
<div class="para logical">
<div class="para">If <span class="process-math">\(\{ \bfv_1, \ldots, \bfv_n \}\)</span> is an orthogonal set of vectors in an inner product space <span class="process-math">\(V\text{,}\)</span> then</div>
<div class="displaymath process-math">
\begin{equation*}
\vnorm{\bfv_1 + \cdots + \bfv_n}^2 = \vnorm{\bfv_1}^2 + \cdots + \vnorm{\bfv_n}^2\text{.}
\end{equation*}
</div>
