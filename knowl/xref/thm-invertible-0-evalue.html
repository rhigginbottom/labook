<span class="type">Theorem</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">6.1.12</span><span class="period heading-divison-mark heading-divison-mark__period">.</span>
</h4>
<div class="para">Suppose <span class="process-math">\(V\)</span> is a finite dimensional vector space and <span class="process-math">\(T \in L(V)\text{.}\)</span> Then <span class="process-math">\(0\)</span> is an eigenvalue of <span class="process-math">\(T\)</span> if and only if <span class="process-math">\(T\)</span> is not invertible.<div class="autopermalink" data-description="Paragraph"><a href="#thm-invertible-0-evalue-1-1" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div> 
<div class="para">If <span class="process-math">\(A \in M_n(\ff)\text{,}\)</span> then <span class="process-math">\(0\)</span> is an eigenvalue of <span class="process-math">\(A\)</span> if and only if <span class="process-math">\(A\)</span> is not invertible.<div class="autopermalink" data-description="Paragraph"><a href="#thm-invertible-0-evalue-1-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
